<!doctype html>
<html lang="hu">
<head>
    <meta charset="utf-8">
    <title>Karbantartás hozzáadása</title>
</head>
<body>
    <h1>Karbantartás hozzáadása</h1>

    <form method="POST" action="/add_maintenance">
        <label>Autó:</label>
        <select name="car_id">
            {% for car in cars %}
                <option value="{{ car._id }}">
                    {{ car.marque }} {{ car.modele }} - {{ car.matricule }}
                </option>
            {% endfor %}
        </select>

        <br><br>

        <label>Karbantartás típusa:</label>
        <select name="type">
			<option value="olajcsere">Olajcsere</option>
			<option value="nagyszerviz">Nagyszerviz</option>
		</select>

        <br><br>

        <label>Aktuális km:</label>
        <input type="number" name="current_km">

        <br><br>
		
		<label>Karbantartás dátuma:</label>
		<input type="date" name="date">

        <label>Szervizpartner:</label>
		<select name="partner_id">
			{% for partner in partners %}
				{% if partner.type == "szerviz" %}
					<option value="{{ partner._id }}">
						{{ partner.name }}
					</option>
				{% endif %}
			{% endfor %}
		</select>

        <br><br>

        <label>Költség:</label>
        <input type="number" name="cost">

        <br><br>

        <label>Megjegyzés:</label>
        <textarea name="description"></textarea>

        <br><br>

        <button type="submit">Mentés</button>
    </form>
</body>
</html>
